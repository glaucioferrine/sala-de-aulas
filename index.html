<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Aulas</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

header{
    background:#111;
    padding:20px;
    border-bottom:3px solid #c40000;
    font-size:22px;
    color:#ff2d2d;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.menu{
    width:280px;
    background:#141414;
    border-right:2px solid #c40000;
    padding:10px;
}

.aula{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.aula:hover{
    background:#c40000;
}

.video{
    flex:1;
    padding:20px;
}

iframe{
    width:100%;
    height:80vh;
    border:none;
}
</style>
</head>

<body>

<header>
Sala de Aulas
</header>

<div class="container">

<div class="menu">

<div class="aula" onclick="trocar('dQw4w9WgXcQ')">Aula 1</div>
<div class="aula" onclick="trocar('dQw4w9WgXcQ')">Aula 2</div>
<div class="aula" onclick="trocar('dQw4w9WgXcQ')">Aula 3</div>

</div>

<div class="video">

<iframe id="player" src=""></iframe>

</div>

</div>

<!-- FIREBASE LOGIN PROTECTION -->

const firebaseConfig = {

<script>
function trocar(video){
    document.getElementById("player").src =
    "https://www.youtube.com/embed/" + video;
}
</script>

</body>
</html>

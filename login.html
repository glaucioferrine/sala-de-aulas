<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dōjō | Glaucio Ferrine</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Montserrat', sans-serif;
    background:#000;
    color:white;
}

/* SPLASH */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, #1a0000, #000 60%);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    transition:opacity 1s ease;
}

#splash h1{
    font-size:30px;
    color:#ff2d2d;
    text-shadow:0 0 20px #ff0000;
}

#splash p{
    color:#888;
    margin-top:10px;
    font-size:14px;
}

/* LOGIN CONTAINER */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:360px;
    background:rgba(20,20,20,0.95);
    padding:35px;
    border-radius:14px;
    border:1px solid #c40000;
    box-shadow:0 0 40px rgba(255,0,0,0.15);
    opacity:0;
    transform:translateY(30px);
    transition:all 1s ease;
}

.box.show{
    opacity:1;
    transform:translateY(0);
}

.logo{
    text-align:center;
    font-size:20px;
    color:#ff2d2d;
    font-weight:600;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-bottom:25px;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#222;
    border:none;
    color:white;
    border-radius:6px;
    transition:0.2s;
}

input:focus{
    outline:none;
    border:1px solid #ff2d2d;
    box-shadow:0 0 10px rgba(255,45,45,0.3);
}

/* SENHA WRAPPER */
.input-wrapper{
    position:relative;
}

.input-wrapper input{
    padding-right:42px;
}

/* OLHO */
.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    cursor:pointer;
    color:#aaa;
}

.eye svg{
    width:100%;
    height:100%;
}

/* BOTÃO */
button{
    width:100%;
    padding:12px;
    background:#c40000;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
    font-weight:600;
    transition:0.2s;
}

button:hover{
    background:#ff0000;
}

button:active{
    transform:scale(0.98);
}

.loading{
    opacity:0.7;
    pointer-events:none;
}

/* ESQUECEU A SENHA */
.forgot{
    text-align:center;
    margin-top:14px;
    font-size:12.5px;
    color:#aaa;
    cursor:pointer;
    transition:0.2s;
}

.forgot:hover{
    color:#ff2d2d;
    text-decoration:underline;
}

/* MSG */
#msg{
    text-align:center;
    margin-top:10px;
    color:#ff4d4d;
    font-size:13px;
}

/* SHAKE */
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

.shake{
    animation:shake 0.3s;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <h1>Bem-vindo ao Dōjō!</h1>
    
</div>

<!-- LOGIN -->
<div class="container">

<div class="box" id="box">

<div class="logo">Dōjō | Glaucio Ferrine</div>

    
<input type="email" id="email" placeholder="E-mail">

<div class="input-wrapper">
    <input type="password" id="senha" placeholder="Senha">

    <div class="eye" onclick="toggleSenha()" id="eye">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M1 12C2.73 7.11 7.28 4 12 4s9.27 3.11 11 8c-1.73 4.89-6.28 8-11 8S2.73 16.89 1 12z"
                  stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
    </div>
</div>

<button id="btn" onclick="login()">Entrar</button>

<p class="forgot" onclick="esqueceuSenha()">Esqueceu a senha?</p>

<p id="msg"></p>

</div>

</div>

<!-- SPLASH SCRIPT -->
<script>
setTimeout(() => {
    document.getElementById("splash").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("box").classList.add("show");
    }, 1000);

}, 1500);
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzHv6pERITgxWslvSqn_Qz0mIIVf8XLxc",
  authDomain: "glaucio-ferrine.firebaseapp.com",
  projectId: "glaucio-ferrine",
  storageBucket: "glaucio-ferrine.firebasestorage.app",
  messagingSenderId: "1047109845257",
  appId: "1:1047109845257:web:7d8ebe2aa817d0114713d8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const btn = document.getElementById("btn");
const box = document.getElementById("box");

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

btn.innerText = "Entrando...";
btn.classList.add("loading");

signInWithEmailAndPassword(auth, email, senha)
.then(() => {

    btn.innerText = "Sucesso";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 500);

})
.catch(() => {

    document.getElementById("msg").innerText = "Acesso inválido";

    box.classList.add("shake");

    setTimeout(() => {
        box.classList.remove("shake");
    }, 300);

    btn.innerText = "Entrar";
    btn.classList.remove("loading");

});

}

window.esqueceuSenha = function(){

const email = document.getElementById("email").value;
const msg = document.getElementById("msg");

if(!email){
    msg.style.color = "#ff4d4d";
    msg.innerText = "Digite seu e-mail no campo acima primeiro";
    return;
}

sendPasswordResetEmail(auth, email)
.then(() => {
    msg.style.color = "#4dff88";
    msg.innerText = "E-mail de recuperação enviado! Verifique sua caixa de entrada.";
})
.catch((error) => {
    msg.style.color = "#ff4d4d";

    if(error.code === "auth/invalid-email"){
        msg.innerText = "E-mail inválido";
    } else if(error.code === "auth/user-not-found"){
        msg.innerText = "Nenhuma conta encontrada com esse e-mail";
    } else {
        msg.innerText = "Erro ao enviar e-mail de recuperação";
    }
});

}

window.toggleSenha = function(){
    const input = document.getElementById("senha");
    const eye = document.getElementById("eye");

    const isHidden = input.type === "password";

    input.type = isHidden ? "text" : "password";

    eye.innerHTML = isHidden
    ? `<svg viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94C16.16 19.24 14.15 20 12 20C7.28 20 2.73 16.89 1 12C2.73 7.11 7.28 4 12 4s9.27 3.11 11 8c-.6 1.7-1.5 3.23-2.62 4.5" stroke="currentColor" stroke-width="2"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none"><path d="M1 12C2.73 7.11 7.28 4 12 4s9.27 3.11 11 8c-1.73 4.89-6.28 8-11 8S2.73 16.89 1 12z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>`;
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        login();
    }
});

</script>

</body>
</html>

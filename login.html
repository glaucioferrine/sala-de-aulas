<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dōjō | Glaucio Ferrine</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* SPLASH (entrada inicial) */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    animation:fadeOut 2.5s ease forwards;
    animation-delay:1.5s;
}

#splash h1{
    color:#ff2d2d;
    font-size:28px;
    letter-spacing:2px;
}

#splash p{
    color:#777;
    margin-top:10px;
    font-size:14px;
}

/* LOGIN */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:360px;
    background:#151515;
    padding:35px;
    border-radius:14px;
    border:1px solid #c40000;
    box-shadow:0 0 30px rgba(196,0,0,0.25);
    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.8s ease forwards;
    animation-delay:2.2s;
}

.logo{
    text-align:center;
    font-size:20px;
    color:#ff2d2d;
    font-weight:bold;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#222;
    border:none;
    color:white;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#c40000;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}

button:hover{
    background:#ff0000;
}

#msg{
    text-align:center;
    margin-top:10px;
    color:#ff4d4d;
    font-size:13px;
}

/* animações */
@keyframes fadeOut{
    0%{opacity:1;}
    100%{opacity:0; visibility:hidden;}
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <h1>⛩️ Dōjō | Glaucio Ferrine</h1>
<p>O caminho de volta ao Ser</p>

<!-- LOGIN -->
<div class="container">

<div class="box">

<div class="logo">⛩️ Dōjō | Glaucio Ferrine</div>
<div class="sub">O caminho de volta ao Ser</div>

<input type="email" id="email" placeholder="E-mail">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzHv6pERITgxWslvSqn_Qz0mIIVf8XLxc",
  authDomain: "glaucio-ferrine.firebaseapp.com",
  projectId: "glaucio-ferrine",
  storageBucket: "glaucio-ferrine.firebasestorage.app",
  messagingSenderId: "1047109845257",
  appId: "1:1047109845257:web:7d8ebe2aa817d0114713d8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth, email, senha)
.then(() => {
    window.location.href = "index.html";
})
.catch(() => {
    document.getElementById("msg").innerText = "Acesso inválido";
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#151515;
    padding:40px;
    border-radius:12px;
    width:320px;
    border:1px solid #c40000;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#222;
    border:none;
    color:white;
}

button{
    width:100%;
    padding:12px;
    background:#c40000;
    border:none;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff0000;
}
</style>

</head>

<body>

<div class="box">

<h2>Entrar</h2>

<input type="email" id="email" placeholder="E-mail">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Acessar</button>

<p id="msg"></p>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzHv6pERITgxWslvSqn_Qz0mIIVf8XLxc",
  authDomain: "glaucio-ferrine.firebaseapp.com",
  projectId: "glaucio-ferrine",
  storageBucket: "glaucio-ferrine.firebasestorage.app",
  messagingSenderId: "1047109845257",
  appId: "1:1047109845257:web:7d8ebe2aa817d0114713d8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth, email, senha)
.then(() => {
    window.location.href = "index.html";
})
.catch((error) => {
    document.getElementById("msg").innerText = "Acesso negado";
});

}

</script>

</body>
</html>
